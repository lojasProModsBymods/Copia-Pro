<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Copia & Salva Pro</title>
    <meta name="theme-color" content="#165DFF">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#165DFF',
                        secondary: '#36BFFA',
                        accent: '#FF7D00',
                        success: '#00B42A',
                        danger: '#F53F3F',
                        neutral: {
                            50: '#F7F8FA', 100: '#F2F3F5', 200: '#E5E6EB',
                            300: '#C9CDD4', 400: '#86909C', 500: '#4E5969',
                            600: '#2E3440', 700: '#1E222C', 800: '#141414', 900: '#0A0A0A'
                        }
                    },
                    fontFamily: { sans: ['Inter', 'Segoe UI', 'sans-serif'] }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .card { @apply bg-white dark:bg-neutral-800 rounded-2xl shadow-sm hover:shadow-md transition-shadow duration-300 border border-neutral-100 dark:border-neutral-700; }
            .btn { @apply px-4 py-2 rounded-xl font-medium transition-all duration-200 flex items-center justify-center gap-2 active:scale-95; }
            .btn-secondary { @apply bg-neutral-100 hover:bg-neutral-200 dark:bg-neutral-700 dark:hover:bg-neutral-600 text-neutral-700 dark:text-neutral-200; }
            .input-field { @apply w-full p-3 border border-neutral-200 dark:border-neutral-700 rounded-xl bg-neutral-50 dark:bg-neutral-900 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary dark:text-white; }
            .pasta-ativa { @apply bg-primary/10 border-primary; }
        }
    </style>
    <style>
        @keyframes fadeInUp {
            from { opacity: 0; transform: translate3d(0, 12px, 0); }
            to { opacity: 1; transform: translate3d(0, 0, 0); }
        }
        @keyframes fadeOut {
            to { opacity: 0; transform: translate3d(0, -8px, 0); }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translate3d(0, 100%, 0); }
            to { opacity: 1; transform: translate3d(0, 0, 0); }
        }
        .fade-in { animation: fadeInUp 0.35s cubic-bezier(0.22, 1, 0.36, 1) both; }
        .item-card { will-change: opacity, transform; contain: layout style paint; }
        .item-card.removing { animation: fadeOut 0.3s ease-in both; }
        .modal-overlay { animation: fadeInUp 0.2s ease-out both; }
        .modal-panel { animation: slideUp 0.35s cubic-bezier(0.22, 1, 0.36, 1) both; }
        html { scroll-behavior: smooth; -webkit-tap-highlight-color: transparent; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        body, header, .card, .input-field, .btn-secondary {
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }
        textarea { resize: none; }
    </style>
</head>
<body class="bg-neutral-50 dark:bg-neutral-900 min-h-screen font-sans text-neutral-800 dark:text-neutral-100">
    <!-- Cabeçalho -->
    <header class="sticky top-0 z-30 bg-white/80 dark:bg-neutral-800/80 backdrop-blur-md border-b border-neutral-100 dark:border-neutral-700">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-primary to-secondary flex items-center justify-center">
                    <i class="fa fa-copy text-white text-lg"></i>
                </div>
                <h1 class="text-xl font-bold">Copia & Salva Pro</h1>
            </div>
            <div class="flex gap-2">
                <button id="btnOpcoes" class="w-10 h-10 rounded-xl bg-neutral-100 dark:bg-neutral-700 flex items-center justify-center" title="Mais Opções">
                    <i class="fa fa-ellipsis-v"></i>
                </button>
                <button id="toggleTema" class="w-10 h-10 rounded-xl bg-neutral-100 dark:bg-neutral-700 flex items-center justify-center" aria-label="Alternar tema">
                    <i class="fa fa-moon-o dark:hidden"></i>
                    <i class="fa fa-sun-o hidden dark:block text-yellow-400"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Conteúdo Principal -->
    <main class="container mx-auto px-4 py-5 pb-24">
        <!-- Barra de Pastas -->

            <div class="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">

                <div id="listaPastas" class="flex gap-2"></div>

                    <i class="fa fa-plus"></i> Nova Pasta

            </div>
        </section>

        <!-- Área de Entrada -->
        <section class="card p-5 mb-6 fade-in">
            <h2 class="text-lg font-semibold mb-3 flex items-center gap-2">
                <i class="fa fa-edit text-primary"></i> Novo Conteúdo

            <div class="mt-3">

            </div>

        <!-- Área de Imagem -->
        <section class="card p-5 mb-6 fade-in">
            <h2 class="text-lg font-semibold mb-3 flex items-center gap-2">
                <i class="fa fa-image text-primary"></i> Adicionar Imagem

            <label for="fotoEntrada" class="block border-2 border-dashed border-neutral-300 dark:border-neutral-700 rounded-xl p-8 text-center cursor-pointer hover:border-primary transition-colors">
                <i class="fa fa-camera text-4xl text-neutral-400 mb-3"></i>
                <p class="font-medium">Toque para escolher imagem</p>
                <p class="text-sm text-neutral-500 mt-1">Da galeria ou câmera</p>
            </label>
            <div id="previewFoto" class="mt-5 hidden">

                <div class="flex gap-2.5 mt-4">
                    <button id="btnSalvarFoto" class="btn bg-success hover:bg-success/90 text-white flex-1"><i class="fa fa-save"></i> <span id="btnSalvarFotoText">Salvar</span></button>
                    <button onclick="compartilharFoto()" class="btn bg-accent hover:bg-accent/90 text-white flex-1"><i class="fa fa-share-alt"></i> Compartilhar</button>
                </div>
            </div>
        </section>

        <!-- Lista de Conteúdos -->
        <section class="card p-5 fade-in">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 mb-4">
                <div>
                    <h2 class="text-lg font-semibold flex items-center gap-2">
                        <i class="fa fa-folder-open text-primary"></i> Conteúdos Salvos
                        <span id="contadorItens" class="bg-primary/10 text-primary px-2.5 py-0.5 rounded-full text-xs font-medium">0</span>
                    </h2>
                </div>
                <div class="w-full sm:w-auto">
                    <input type="text" id="busca" placeholder="Buscar conteúdo..." class="input-field text-sm py-2">
                </div>
            </div>
            <div id="listaSalvos" class="space-y-4 min-h-[120px]">
                <div class="text-center py-10 text-neutral-500">
                    <i class="fa fa-inbox text-4xl mb-3 opacity-30"></i>
                    <p>Nenhum conteúdo salvo ainda</p>
                </div>
            </div>
        </section>
    </main>

        <div class="modal-panel absolute bottom-0 left-0 right-0 max-h-[85vh] overflow-y-auto rounded-t-3xl bg-white dark:bg-neutral-800 p-6 pb-8 shadow-2xl">
            <div class="w-10 h-1 rounded-full bg-neutral-300 dark:bg-neutral-600 mx-auto mb-5"></div>
            <h2 class="text-lg font-bold mb-5">Mais Opções</h2>

                <div class="space-y-2">

            <div class="mt-4">
                <h3 class="font-semibold text-sm text-neutral-500 uppercase tracking-wider mb-3">Sobre o App</h3>
                <p class="text-sm text-neutral-500 dark:text-neutral-400 leading-relaxed">Versão 1.0 &bull; Seus dados ficam salvos apenas no seu aparelho. Nada é enviado para servidores externos.</p>
            </div>

    <!-- Modal de Mover Item -->
    <div id="modalMover" class="fixed inset-0 z-50 hidden">
        <div class="modal-overlay absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="fecharModalMover()"></div>
        <div class="modal-panel absolute bottom-0 left-0 right-0 rounded-t-3xl bg-white dark:bg-neutral-800 p-6 pb-8 shadow-2xl">
            <div class="w-10 h-1 rounded-full bg-neutral-300 dark:bg-neutral-600 mx-auto mb-5"></div>
            <h2 class="text-lg font-bold mb-4">Mover para Pasta</h2>
            <div id="listaMoverPastas" class="space-y-2"></div>
        </div>
    </div>

    <input type="file" id="inputRestaurar" accept=".json" class="hidden">

    <script>
    (function() {
        'use strict';

        // ================================================================
        //  CACHE LOCAL (localStorage)
        // ================================================================
        var _cacheConteudos = null;
        var _cachePastas = null;
        var _cacheInvalidado = true;

        function invalidarCache() { _cacheInvalidado = true; }

        function obterConteudos() {
            if (_cacheConteudos === null || _cacheInvalidado) {
                try { _cacheConteudos = JSON.parse(localStorage.getItem('conteudosSalvos')) || []; }
                catch { _cacheConteudos = []; }
                _cacheInvalidado = false;
            }
            return _cacheConteudos;
        }

        function obterPastas() {
            if (_cachePastas === null || _cacheInvalidado) {
                try { _cachePastas = JSON.parse(localStorage.getItem('pastas')) || []; }
                catch { _cachePastas = []; }
            }
            return _cachePastas;
        }

        function salvarConteudos(lista) {
            _cacheConteudos = lista;
            localStorage.setItem('conteudosSalvos', JSON.stringify(lista));
        }

        function salvarPastas(lista) {
            _cachePastas = lista;
            localStorage.setItem('pastas', JSON.stringify(lista));
        }

        // ================================================================
        //  ELEMENTOS
        // ================================================================
        var $ = function(id) { return document.getElementById(id); };
        var textoEntrada = $('textoEntrada');
        var listaSalvos = $('listaSalvos');
        var contadorItens = $('contadorItens');
        var buscaInput = $('busca');
        var previewFoto = $('previewFoto');
        var imagemPreview = $('imagemPreview');
        var toggleTema = $('toggleTema');
        var listaPastasEl = $('listaPastas');
        var pastaSelecionadaEl = $('pastaSelecionada');
        var btnOpcoes = $('btnOpcoes');
        var modalOpcoes = $('modalOpcoes');
        var modalMover = $('modalMover');
        var listaMoverPastas = $('listaMoverPastas');
        var inputRestaurar = $('inputRestaurar');

        var fotoAtual = null;
        var pastaAtual = 'todas';
        var itemIdEditando = null;
        var moverItemId = null;

        // ================================================================
        //  UTILITÁRIOS
        // ================================================================
        function escaparHTML(str) {
            var div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function debounce(fn, delay) {
            var timer;
            return function() {
                var args = arguments;
                var ctx = this;
                clearTimeout(timer);
                timer = setTimeout(function() { fn.apply(ctx, args); }, delay);
            };
        }

        function dataURLtoBlob(dataURL) {
            try {
                var parts = dataURL.split(',');
                var mimeMatch = parts[0].match(/:(.*?);/);
                if (!mimeMatch) throw new Error('formato invalido');
                var mime = mimeMatch[1];
                var b64 = atob(parts[1]);
                var arr = new Uint8Array(b64.length);
                for (var i = 0; i < b64.length; i++) arr[i] = b64.charCodeAt(i);
                return new Blob([arr], { type: mime });
            } catch (e) {
                console.error('dataURLtoBlob erro:', e);
                return null;
            }
        }

        function comprimirImagem(dataURL, maxLargura, qualidade) {
            maxLargura = maxLargura || 1200;
            qualidade = qualidade || 0.75;
            return new Promise(function(resolve) {
                var img = new Image();
                var timeout = setTimeout(function() { resolve(dataURL); }, 8000);
                img.onload = function() {
                    clearTimeout(timeout);
                    try {
                        var canvas = document.createElement('canvas');
                        var w = img.width, h = img.height;
                        if (w > maxLargura) { h = Math.round(h * maxLargura / w); w = maxLargura; }
                        canvas.width = w;
                        canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        resolve(canvas.toDataURL('image/jpeg', qualidade));
                    } catch (e) { resolve(dataURL); }
                };
                img.onerror = function() { clearTimeout(timeout); resolve(dataURL); };
                img.src = dataURL;
            });
        }

        function comprimirESalvarLocal(arquivo) {
            return new Promise(function(resolve, reject) {
                var urlObj = URL.createObjectURL(arquivo);
                var img = new Image();
                img.onload = function() {
                    URL.revokeObjectURL(urlObj);
                    tentar(0.8);
                };
                img.onerror = function() {
                    URL.revokeObjectURL(urlObj);
                    reject(new Error('formato'));
                };
                img.src = urlObj;

                function tentar(qualidade) {
                    var canvas = document.createElement('canvas');
                    var w = img.naturalWidth, h = img.naturalHeight;
                    var MAX = 1200;
                    if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
                    if (h > MAX) { w = Math.round(w * MAX / h); h = MAX; }
                    canvas.width = Math.max(1, w);
                    canvas.height = Math.max(1, h);
                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                    var dataURL = canvas.toDataURL('image/jpeg', qualidade);
                    if (dataURL.length > 1500000 && qualidade > 0.2) {
                        tentar(qualidade - 0.15);
                    } else {
                        resolve(dataURL);
                    }
                }
            });
        }

        // ================================================================
        //  TEMA
        // ================================================================
        toggleTema.addEventListener('click', function() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('tema', document.documentElement.classList.contains('dark') ? 'escuro' : 'claro');
        });

        function aplicarTemaSalvo() {
            var temaSalvo = localStorage.getItem('tema');
            var prefereEscuro = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (temaSalvo === 'escuro' || (!temaSalvo && prefereEscuro)) {
                document.documentElement.classList.add('dark');
            }
        }

        // ================================================================
        //  SISTEMA DE PASTAS
        // ================================================================
        function inicializarPastas() {
            if (!localStorage.getItem('pastas')) {
                salvarPastas([{ id: 'geral', nome: 'Geral' }]);
            }
            atualizarListaPastas();
        }

        function atualizarListaPastas() {
            var lista = obterPastas();
            var fragBtns = document.createDocumentFragment();
            var fragOpts = document.createDocumentFragment();

            lista.forEach(function(pasta) {
                var btn = document.createElement('button');
                btn.className = 'btn btn-secondary text-sm whitespace-nowrap pasta-item';
                btn.dataset.pasta = pasta.id;
                btn.innerHTML = '<i class="fa fa-folder"></i> ' + escaparHTML(pasta.nome);
                if (pasta.id === pastaAtual) btn.classList.add('pasta-ativa');
                btn.onclick = function() { selecionarPasta(pasta.id); };
                fragBtns.appendChild(btn);

                var opt = document.createElement('option');
                opt.value = pasta.id;
                opt.textContent = pasta.nome;
                fragOpts.appendChild(opt);
            });

            listaPastasEl.innerHTML = '';
            listaPastasEl.appendChild(fragBtns);
            pastaSelecionadaEl.innerHTML = '';
            pastaSelecionadaEl.appendChild(fragOpts);
        }

        window.selecionarPasta = function(id) {
            pastaAtual = id;
            document.querySelectorAll('.pasta-item').forEach(function(el) { el.classList.remove('pasta-ativa'); });
            var ativo = document.querySelector('[data-pasta="' + id + '"]');
            if (ativo) ativo.classList.add('pasta-ativa');
            carregarConteudosSalvos();
        };

        window.criarNovaPasta = function() {
            var nome = prompt('Digite o nome da pasta:');
            if (!nome || !nome.trim()) return;
            var pastas = obterPastas();
            pastas.push({ id: 'pasta_' + Date.now(), nome: nome.trim() });
            salvarPastas(pastas);
            invalidarCache();
            atualizarListaPastas();
            mostrarAviso('Pasta criada com sucesso!', 'sucesso');
        };

        // ================================================================
        //  BUSCA COM DEBOUNCE
        // ================================================================
        var buscaDebounced = debounce(function(valor) {
            carregarConteudosSalvos(valor);
        }, 200);

        buscaInput.addEventListener('input', function() {
            buscaDebounced(buscaInput.value.trim().toLowerCase());
        });

        // ================================================================
        //  FUNÇÕES DE TEXTO
        // ================================================================
        window.copiarTexto = async function() {
            var txt = textoEntrada.value.trim();
            if (!txt) return mostrarAviso('Digite algo primeiro!', 'erro');
            try {
                await navigator.clipboard.writeText(txt);
                mostrarAviso('Texto copiado!', 'sucesso');
            } catch {
                mostrarAviso('Não foi possível copiar', 'erro');
            }
        };

        window.colarTexto = async function() {
            try {
                textoEntrada.value = await navigator.clipboard.readText();
                mostrarAviso('Texto colado!', 'sucesso');
            } catch {
                mostrarAviso('Não foi possível colar', 'erro');
            }
        };

        window.salvarTexto = function() {
            var txt = textoEntrada.value.trim();
            if (!txt) return mostrarAviso('Escreva algo para salvar!', 'erro');

            var lista = obterConteudos();

            if (itemIdEditando) {
                var idx = lista.findIndex(function(i) { return String(i.id) === String(itemIdEditando); });
                if (idx !== -1) {
                    lista[idx].dados = txt;
                    lista[idx].data = new Date().toLocaleString('pt-BR');
                    lista[idx].pasta = pastaSelecionadaEl.value;
                }
                itemIdEditando = null;
            } else {
                lista.unshift({
                    id: Date.now(),
                    tipo: 'texto',
                    dados: txt,
                    pasta: pastaSelecionadaEl.value,
                    data: new Date().toLocaleString('pt-BR')
                });
            }

            salvarConteudos(lista);
            textoEntrada.value = '';
            carregarConteudosSalvos(buscaInput.value.trim().toLowerCase());
            mostrarAviso('Salvo!', 'sucesso');
        };

        window.compartilharConteudo = async function() {
            var txt = textoEntrada.value.trim();
            if (!txt) return mostrarAviso('Escreva algo primeiro!', 'erro');
            try {
                await navigator.share({ text: txt });
            } catch {
                try {
                    await navigator.clipboard.writeText(txt);
                    mostrarAviso('Copiado para compartilhar', 'info');
                } catch {
                    mostrarAviso('Não foi possível compartilhar', 'erro');
                }
            }
        };

        // ================================================================
        //  FUNÇÕES DE IMAGEM
        // ================================================================
        $('fotoEntrada').addEventListener('change', function(e) {
            var arq = e.target.files[0];
            if (!arq) return;
            if (!arq.type.startsWith('image/')) {
                mostrarAviso('Selecione um arquivo de imagem', 'erro');
                return;
            }

            mostrarAviso('Processando imagem...', 'info');
            $('btnSalvarFoto').disabled = true;
            $('btnSalvarFotoText').textContent = 'Processando...';

            comprimirESalvarLocal(arq).then(function(dataURL) {
                fotoAtual = dataURL;
                imagemPreview.src = dataURL;
                imagemPreview.onerror = function() {};
                previewFoto.classList.remove('hidden');
                mostrarAviso('Imagem pronta! Clique em Salvar.', 'sucesso');
            }).catch(function(err) {
                console.error('Erro foto:', err);
                if (err && err.message === 'formato') {
                    mostrarAviso('Formato nao suportado. Use JPG ou PNG.', 'erro');
                } else {
                    mostrarAviso('Erro ao processar a imagem. Tente outra.', 'erro');
                }
            }).finally(function() {
                $('btnSalvarFoto').disabled = false;
                $('btnSalvarFotoText').textContent = 'Salvar';
            });
        });

        $('btnSalvarFoto').addEventListener('click', function() {
            if (!fotoAtual) {
                mostrarAviso('Selecione uma imagem primeiro', 'erro');
                return;
            }
            salvarFoto();
        });

        function salvarFoto() {
            if (!fotoAtual) return;

            var btnText = $('btnSalvarFotoText');
            var btn = $('btnSalvarFoto');
            btn.disabled = true;
            btnText.textContent = 'Salvando...';

            var lista = obterConteudos();
            lista.unshift({
                id: Date.now(),
                tipo: 'foto',
                dados: fotoAtual,
                pasta: pastaSelecionadaEl.value,
                data: new Date().toLocaleString('pt-BR')
            });
            salvarConteudos(lista);

            fotoAtual = null;
            previewFoto.classList.add('hidden');
            $('fotoEntrada').value = '';
            btn.disabled = false;
            btnText.textContent = 'Salvar';
            carregarConteudosSalvos();
            mostrarAviso('Imagem salva!', 'sucesso');
        }

        window.compartilharFoto = async function() {
            if (!fotoAtual) {
                mostrarAviso('Selecione uma imagem primeiro', 'erro');
                return;
            }
            try {
                if (navigator.canShare && navigator.canShare({ url: fotoAtual })) {
                    await navigator.share({ url: fotoAtual });
                } else {
                    try {
                        await navigator.clipboard.writeText(fotoAtual);
                        mostrarAviso('URL copiada! Cole para compartilhar.', 'sucesso');
                    } catch {
                        mostrarAviso('Compartilhamento nao suportado neste navegador', 'info');
                    }
                }
            } catch (e) {
                if (e.name !== 'AbortError') {
                    mostrarAviso('Compartilhamento cancelado', 'info');
                }
            }
        };

        // ================================================================
        //  RENDERIZAÇÃO DA LISTA
        // ================================================================
        function carregarConteudosSalvos(filtro) {
            filtro = filtro || '';
            var lista = obterConteudos().slice();

            if (pastaAtual !== 'todas') {
                lista = lista.filter(function(i) { return i.pasta === pastaAtual; });
            }
            if (filtro) {
                lista = lista.filter(function(i) {
                    return i.tipo === 'texto' && i.dados.toLowerCase().includes(filtro);
                });
            }

            contadorItens.textContent = lista.length;

            if (!lista.length) {
                listaSalvos.innerHTML = filtro
                    ? '<div class="text-center py-8 text-neutral-500"><p>Nenhum resultado encontrado</p></div>'
                    : '<div class="text-center py-10 text-neutral-500"><i class="fa fa-inbox text-4xl mb-3 opacity-30"></i><p>Nenhum conteúdo salvo ainda</p></div>';
                return;
            }

            var mapaPastas = {};
            obterPastas().forEach(function(p) { mapaPastas[p.id] = p.nome; });

            var html = '';
            for (var i = 0; i < lista.length; i++) {
                var item = lista[i];
                var nomePasta = mapaPastas[item.pasta] || 'Geral';
                var ehTexto = item.tipo === 'texto';
                var atraso = Math.min(i * 0.04, 0.4);

                html += '<div class="card p-4 fade-in item-card" style="animation-delay:' + atraso + 's">';

                if (ehTexto) {
                    html += '<p class="whitespace-pre-wrap break-words text-sm leading-relaxed">' + escaparHTML(item.dados) + '</p>';
                } else {
                    html += '<img src="' + escaparHTML(item.dados) + '" class="w-full max-h-60 object-contain rounded-lg" loading="lazy" onerror="this.alt=\'Imagem indisponivel\'">';
                    html += '<div class="mt-2 flex justify-center">';
                    html += '<button onclick="baixarFoto(' + item.id + ')" class="btn bg-primary/10 text-primary hover:bg-primary/20 text-sm px-4 py-2"><i class="fa fa-download"></i> Baixar foto</button>';
                    html += '</div>';
                }

                html += '<div class="mt-3 pt-2 border-t border-neutral-200 dark:border-neutral-700 flex flex-wrap justify-between items-center gap-2">';
                html += '<span class="text-xs text-neutral-500">' + escaparHTML(item.data) + ' &bull; ' + escaparHTML(nomePasta) + '</span>';
                html += '<div class="flex gap-1.5">';

                if (ehTexto) {
                    html += '<button onclick="editarItem(' + item.id + ')" class="text-xs px-2.5 py-1.5 bg-blue-50 dark:bg-blue-900/30 rounded-lg hover:bg-blue-100 dark:hover:bg-blue-900/50 transition-colors" title="Editar"><i class="fa fa-pencil"></i></button>';
                    html += '<button onclick="copiarItem(' + item.id + ')" class="text-xs px-2.5 py-1.5 bg-neutral-100 dark:bg-neutral-700 rounded-lg hover:bg-neutral-200 dark:hover:bg-neutral-600 transition-colors" title="Copiar"><i class="fa fa-copy"></i></button>';
                }
                html += '<button onclick="moverItem(' + item.id + ')" class="text-xs px-2.5 py-1.5 bg-purple-50 dark:bg-purple-900/30 rounded-lg hover:bg-purple-100 dark:hover:bg-purple-900/50 transition-colors" title="Mover"><i class="fa fa-folder"></i></button>';
                html += '<button onclick="apagarItem(' + item.id + ', this)" class="text-xs px-2.5 py-1.5 bg-red-50 dark:bg-red-900/30 rounded-lg hover:bg-red-100 dark:hover:bg-red-900/50 transition-colors" title="Excluir"><i class="fa fa-trash"></i></button>';

                html += '</div></div></div>';
            }

            listaSalvos.innerHTML = html;
        }

        // ================================================================
        //  AÇÕES DOS ITENS
        // ================================================================
        function encontrarItem(id) {
            return obterConteudos().find(function(i) { return String(i.id) === String(id); }) || null;
        }

        window.baixarFoto = function(id) {
            var item = encontrarItem(id);
            if (!item || !item.dados) return;
            var a = document.createElement('a');
            a.href = item.dados;
            a.download = 'foto_' + id + '.jpg';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            mostrarAviso('Baixando foto...', 'sucesso');
        };

        window.copiarItem = async function(id) {
            var item = encontrarItem(id);
            if (!item) return;
            if (item.tipo === 'texto') {
                try {
                    await navigator.clipboard.writeText(item.dados);
                    mostrarAviso('Copiado!', 'sucesso');
                } catch {
                    mostrarAviso('Não foi possível copiar', 'erro');
                }
            } else {
                mostrarAviso('Use o botão Baixar foto', 'info');
            }
        };

        window.editarItem = function(id) {
            var item = encontrarItem(id);
            if (!item || item.tipo !== 'texto') return;
            itemIdEditando = id;
            textoEntrada.value = item.dados;
            textoEntrada.focus();
            window.scrollTo({ top: 0, behavior: 'smooth' });
            mostrarAviso('Edite e salve para atualizar', 'info');
        };

        window.moverItem = function(id) {
            var item = encontrarItem(id);
            if (!item) return;
            moverItemId = id;
            var html = '';
            obterPastas().forEach(function(p) {
                var ativo = p.id === item.pasta ? 'ring-2 ring-primary' : '';
                html += '<button onclick="confirmarMover(\'' + p.id + '\')" class="w-full flex items-center gap-3 p-3.5 rounded-xl bg-neutral-100 dark:bg-neutral-700 hover:bg-neutral-200 dark:hover:bg-neutral-600 transition-colors ' + ativo + '">';
                html += '<i class="fa fa-folder text-primary w-5 text-center"></i>';
                html += '<span class="font-medium">' + escaparHTML(p.nome) + '</span>';
                html += '</button>';
            });
            listaMoverPastas.innerHTML = html;
            modalMover.classList.remove('hidden');
        };

        window.confirmarMover = function(pastaId) {
            if (!moverItemId) return;
            var lista = obterConteudos();
            var item = lista.find(function(x) { return String(x.id) === String(moverItemId); });
            if (item) {
                item.pasta = pastaId;
                salvarConteudos(lista);
            }
            fecharModalMover();
            carregarConteudosSalvos(buscaInput.value.trim().toLowerCase());
            mostrarAviso('Movido com sucesso!', 'sucesso');
        };

        function fecharModalMover() {
            modalMover.classList.add('hidden');
            moverItemId = null;
        }
        window.fecharModalMover = fecharModalMover;

        window.apagarItem = function(id, btnEl) {
            var card = btnEl ? btnEl.closest('.item-card') : null;
            if (card) {
                card.classList.add('removing');
                setTimeout(function() { executarExclusao(id); }, 280);
            } else {
                if (!confirm('Excluir definitivamente?')) return;
                executarExclusao(id);
            }
        };

        function executarExclusao(id) {
            var novaLista = obterConteudos().filter(function(i) { return String(i.id) !== String(id); });
            salvarConteudos(novaLista);
            carregarConteudosSalvos(buscaInput.value.trim().toLowerCase());
            mostrarAviso('Excluído!', 'sucesso');
        }

        // ================================================================
        //  MODAL DE OPÇÕES
        // ================================================================
        btnOpcoes.addEventListener('click', function() {
            modalOpcoes.classList.remove('hidden');
        });

        window.fecharModalOpcoes = function() {
            modalOpcoes.classList.add('hidden');
        };

        window.exportarTexto = function() {
            var dados = obterConteudos();
            if (!dados.length) { mostrarAviso('Nenhum dado para exportar', 'erro'); return; }
            var texto = '=== Copia & Salva Pro ===\nData: ' + new Date().toLocaleString('pt-BR') + '\n\n';
            dados.forEach(function(item) {
                texto += item.data + '\n';
                texto += item.tipo === 'texto' ? item.dados : '[Arquivo de imagem]';
                texto += '\n----------------------------------------\n';
            });
            baixarArquivo(texto, 'dados_exportados.txt', 'text/plain');
            fecharModalOpcoes();
            mostrarAviso('Exportado com sucesso!', 'sucesso');
        };

        window.criarBackup = function() {
            var dados = {
                data: new Date().toLocaleString('pt-BR'),
                pastas: obterPastas(),
                conteudos: obterConteudos()
            };
            baixarArquivo(JSON.stringify(dados, null, 2), 'copia_seguranca.json', 'application/json');
            fecharModalOpcoes();
            mostrarAviso('Cópia criada com sucesso!', 'sucesso');
        };

        window.restaurarBackup = function() {
            fecharModalOpcoes();
            inputRestaurar.click();
        };

        inputRestaurar.addEventListener('change', function(e) {
            var file = e.target.files[0];
            if (!file) return;
            var leitor = new FileReader();
            leitor.onload = function(res) {
                try {
                    var dados = JSON.parse(res.target.result);
                    if (!dados.conteudos || !Array.isArray(dados.conteudos)) throw new Error('invalido');

                    if (confirm('Quer adicionar esses dados aos existentes?\n\nOK = Adicionar\nCancelar = Substituir tudo')) {
                        var atuais = obterConteudos();
                        var mesclados = dados.conteudos.concat(atuais);
                        salvarConteudos(mesclados);
                    } else {
                        salvarConteudos(dados.conteudos);
                    }
                    if (dados.pastas && Array.isArray(dados.pastas)) {
                        salvarPastas(dados.pastas);
                    }
                    invalidarCache();
                    atualizarListaPastas();
                    carregarConteudosSalvos();
                    mostrarAviso('Dados restaurados com sucesso!', 'sucesso');
                } catch {
                    mostrarAviso('Arquivo invalido ou corrompido!', 'erro');
                }
            };
            leitor.readAsText(file);
            this.value = '';
        });

        window.apagarTudo = function() {
            if (confirm('TEM CERTEZA? Isso apaga TUDO de uma vez e não tem volta!')) {
                if (confirm('Última chance! Realmente deseja apagar todos os dados?')) {
                    localStorage.removeItem('conteudosSalvos');
                    localStorage.removeItem('pastas');
                    invalidarCache();
                    _cacheConteudos = [];
                    _cachePastas = [];
                    inicializarPastas();
                    carregarConteudosSalvos();
                    fecharModalOpcoes();
                    mostrarAviso('Todos os dados foram removidos.', 'sucesso');
                }
            }
        };

        function baixarArquivo(conteudo, nome, tipo) {
            var blob = new Blob([conteudo], { type: tipo });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = nome;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // ================================================================
        //  SISTEMA DE AVISOS
        // ================================================================
        var avisoTimer = null;
        function mostrarAviso(mensagem, tipo) {
            var aviso = $('notificacao');
            var icone = $('iconeNotif');
            var texto = $('textoNotificacao');
            var icones = {
                sucesso: 'fa-check-circle text-green-400',
                erro: 'fa-exclamation-circle text-red-400',
                info: 'fa-info-circle text-blue-400'
            };
            icone.className = 'fa ' + (icones[tipo] || icones.info);
            texto.textContent = mensagem;

            if (avisoTimer) clearTimeout(avisoTimer);
            aviso.style.opacity = '1';
            aviso.style.transform = 'translate3d(-50%, 0, 0)';

            avisoTimer = setTimeout(function() {
                aviso.style.opacity = '0';
                aviso.style.transform = 'translate3d(-50%, 8px, 0)';
            }, 2500);
        }

        // ================================================================
        //  INICIALIZAÇÃO
        // ================================================================
        window.addEventListener('DOMContentLoaded', function() {
            aplicarTemaSalvo();
            inicializarPastas();
            carregarConteudosSalvos();
        });

    })();
    </script>
</body>
</html>
